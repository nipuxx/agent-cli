model:
  name: local-model
  base_url: http://localhost:8000/v1
  api_key_env: OPENAI_API_KEY
  context_length: 262144
  input_cost_per_million: null
  output_cost_per_million: null
runtime:
  max_step_seconds: 600
  max_steps_per_run: 1
  artifact_inline_char_limit: 12000
  daily_digest_enabled: true
  daily_digest_time: "08:00"
tools:
  browser: true
  web: true
  shell: true
  files: true
  # search_provider: duckduckgo  # 'duckduckgo' (default) or 'tavily'
email:
  enabled: false
  smtp_host: ""
  smtp_port: 587
  username: ""
  password_env: NIPUX_EMAIL_PASSWORD
  from_addr: ""
  to_addr: ""
